<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <div class="blog-post-card">
        <img class="post-img" src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" alt="Somebody typing using a laptop">
        <div class="post-content">
            <h2 class="post-title">A New Project Begins</h2>
            <p class="post-excerpt">Excited to start this new opportunity and learn so much along the way!</p>
            <a class="read-more" href="https://www.freecodecamp.org/">Read More</a>
        </div>
    </div>
</body>
</html>
