<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <main class="to-do-container">
        <h1 class="header">My To-Do List</h1>
        <div class="todo-list">
            <ul>
                <li class="invisible">
                <input id="one" type="checkbox" name="one"><label for="one">Task 1</label>
                    <ul class="sub-item">
                        <li><a class="sub-item-link" href="https://www.google.com" target="_blank" rel="noopener noreferrer">Test 1</a></li>
                    </ul>
                </li>
                <li class="invisible">
                <input id="two" type="checkbox" name="two"><label for="two">Task 2</label>
                    <ul class="sub-item">
                        <li><a class="sub-item-link" href="https://www.google.com" target="_blank" rel="noopener noreferrer">Test 2</a></li>
                    </ul>
                </li>
                <li class="invisible" >
                <input id="three" type="checkbox" name="three"><label for="three">Task 3</label>
                    <ul class="sub-item">
                        <li><a class="sub-item-link" href="https://www.google.com" target="_blank" rel="noopener noreferrer">Test 3</a></li>
                    </ul>
                </li>
                <li class="invisible">
                <input id="four" type="checkbox" name="four"><label for="four">Task 4</label>
                    <ul class="sub-item">
                        <li><a class="sub-item-link" href="https://www.google.com" target="_blank" rel="noopener noreferrer">Test 4</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </main>
</body>
</html>
